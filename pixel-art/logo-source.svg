<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#533afd"/>
      <stop offset="100%" style="stop-color:#7c5cfc"/>
    </linearGradient>
    <linearGradient id="rose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c44569"/>
      <stop offset="100%" style="stop-color:#e06a8a"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <!-- Diamond accent -->
  <polygon points="100,20 140,100 100,180 60,100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- S letter -->
  <text x="85" y="108" font-family="Georgia,serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">S</text>
  <text x="130" y="108" font-family="Georgia,serif" font-size="48" font-weight="bold" fill="url(#rose)" text-anchor="middle" dominant-baseline="middle">A</text>
  <!-- Subtle sparkle -->
  <circle cx="40" cy="40" r="3" fill="rgba(255,255,255,0.6)"/>
  <circle cx="160" cy="55" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="50" cy="160" r="2" fill="rgba(255,255,255,0.4)"/>
</svg>
